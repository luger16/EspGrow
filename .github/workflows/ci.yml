name: CI

on:
  push:
  pull_request:

jobs:
  web:
    name: Web (check / lint / format / test / build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test
      - run: npm run build
      - name: Verify generated firmware contract is up to date
        run: git diff --exit-code ../firmware/src/contract.h

  firmware:
    name: Firmware (compile c3 + xiao-s3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build web assets
        working-directory: web
        run: |
          npm ci
          npm run build
      - name: Embed web assets into header
        working-directory: firmware
        run: python3 tools/embed_web.py
      - name: Install PlatformIO
        run: pip install --upgrade platformio
      - name: Compile firmware (ESP32-C3)
        working-directory: firmware
        run: pio run -e c3
      - name: Compile firmware (XIAO ESP32-S3)
        working-directory: firmware
        run: pio run -e xiao-s3
